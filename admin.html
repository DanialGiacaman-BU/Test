<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BU Labs | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Hidden by default to prevent data leak before security check */
        body { display: none; }
    </style>
</head>
<body class="bg-slate-100 font-['Inter']">

    <nav class="bg-[#062f68] text-white p-4 shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-2 h-6 bg-[#fed738] rounded-full"></div>
                <span class="font-bold tracking-tighter uppercase">Admin Control Panel</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right hidden md:block">
                    <p id="adminName" class="text-[10px] font-bold uppercase tracking-widest text-[#fed738]"></p>
                    <p class="text-[9px] opacity-60 uppercase">Systems Administrator</p>
                </div>
                <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all border border-white/20">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-[#062f68]">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Total Logs</p>
                <h3 id="statTotal" class="text-3xl font-black text-[#062f68] mt-1">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Approved</p>
                <h3 id="statApproved" class="text-3xl font-black text-emerald-500 mt-1">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-[#fed738]">
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Pending Review</p>
                <h3 id="statPending" class="text-3xl font-black text-[#fed738] mt-1">0</h3>
            </div>
        </div>

        <div class="bg-white p-4 md:p-8 rounded-3xl shadow-xl overflow-hidden border border-white">
            <div class="flex flex-col md:row justify-between items-center mb-8 gap-4">
                <h2 class="font-black text-[#062f68] uppercase text-xl tracking-tight">Master Reservation Log</h2>
                <button onclick="exportToExcel()" class="bg-[#006838] hover:bg-opacity-90 text-white px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Download Master Excel
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-separate border-spacing-y-2" id="adminTable">
                    <thead>
                        <tr class="text-gray-400 text-[9px] uppercase tracking-[0.2em] font-black">
                            <th class="px-4 py-2">Requester Info</th>
                            <th class="px-4 py-2">Schedule Details</th>
                            <th class="px-4 py-2">Current Status</th>
                            <th class="px-4 py-2 text-center">Administrative Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 1. SECURE GATEKEEPER
        const session = JSON.parse(sessionStorage.getItem('bu_user'));
        
        if (!session || session.role !== 'admin') {
            alert("ACCESS DENIED: Administrative Privileges Required.");
            window.location.href = 'index.html';
        } else {
            // Authorized - Show the page
            document.body.style.display = 'block';
            document.getElementById('adminName').innerText = session.name;
        }

        // 2. FETCH ALL DATA
        async function loadAdminData() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center animate-pulse font-black text-bu-navy opacity-20 uppercase tracking-[0.3em]">Syncing Global Database...</td></tr>';
            
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                window.allData = data; // Global store for Excel export

                // Calculate Stats
                document.getElementById('statTotal').innerText = data.length;
                document.getElementById('statApproved').innerText = data.filter(r => r.Status === 'Approved').length;
                document.getElementById('statPending').innerText = data.filter(r => r.Status === 'Pending' || r.Status === '').length;

                tbody.innerHTML = '';
                
                // Sort by row index descending (newest first)
                data.sort((a,b) => b.rowIndex - a.rowIndex);

                data.forEach(row => {
                    const status = row.Status || 'Pending';
                    const statusClass = status.toLowerCase() === 'approved' ? 'status-approved' : 'status-pending';
                    
                    tbody.innerHTML += `
                        <tr class="bg-slate-50/50 hover:bg-white hover:shadow-md transition-all group">
                            <td class="py-5 px-4 rounded-l-2xl">
                                <div class="font-black text-[#062f68] text-sm uppercase">${row.Full_Name}</div>
                                <div class="text-[10px] text-gray-400 font-mono tracking-tighter">${row.Email_Address}</div>
                            </td>
                            <td class="py-5 px-4">
                                <div class="text-xs font-black text-slate-700">${row.Reservation_Date}</div>
                                <div class="text-[9px] uppercase font-bold text-bu-navy opacity-60">${row.Select_a_Room}</div>
                                <div class="text-[9px] font-mono mt-1 text-gray-400">${row.Reservation_Start_Time} - ${row.Reservation_End_Time}</div>
                            </td>
                            <td class="py-5 px-4">
                                <span class="status-pill ${statusClass}">${status}</span>
                            </td>
                            <td class="py-5 px-4 rounded-r-2xl text-center">
                                <div class="flex gap-2 justify-center opacity-40 group-hover:opacity-100 transition-opacity">
                                    <button onclick="changeStatus(${row.rowIndex}, 'Approved')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-2 rounded-lg text-[9px] font-black uppercase tracking-wider transition-all">Approve</button>
                                    <button onclick="changeStatus(${row.rowIndex}, 'Rejected')" class="bg-rose-500 hover:bg-rose-600 text-white px-3 py-2 rounded-lg text-[9px] font-black uppercase tracking-wider transition-all">Reject</button>
                                </div>
                            </td>
                        </tr>`;
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center text-red-500 font-bold">Failed to load system data. Check API connection.</td></tr>';
            }
        }

        // 3. UPDATE STATUS ACTION
        async function changeStatus(rowId, newStatus) {
            const confirmed = confirm(`Are you sure you want to mark this request as ${newStatus}?`);
            if(!confirmed) return;
            
            // Temporary UI feedback
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '...';
            btn.disabled = true;

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'updateStatus',
                        rowIndex: rowId,
                        newStatus: newStatus
                    })
                });
                
                // Refresh data
                loadAdminData();
            } catch (err) {
                alert("Error updating database.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // Initialize
        window.onload = loadAdminData;
    </script>
</body>
</html>
